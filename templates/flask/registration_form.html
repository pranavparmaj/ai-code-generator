<!DOCTYPE html>
<html>
<head>
<title>{{ page_title }}</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f8fc;
    color: #14213d;
}
.shell {
    max-width: 900px;
    margin: 0 auto;
    padding: 42px 20px 60px;
}
.hero {
    text-align: center;
    margin-bottom: 24px;
}
.badge {
    display: inline-block;
    padding: 6px 12px;
    border-radius: 999px;
    background: #d8eef2;
    color: #0f6c7a;
    font-size: 12px;
    font-weight: bold;
}
.panel {
    background: white;
    border-radius: 24px;
    padding: 28px;
    box-shadow: 0 18px 50px rgba(20, 33, 61, 0.10);
}
.grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
}
.field {
    margin-bottom: 8px;
}
.field.full {
    grid-column: 1 / -1;
}
label {
    display: block;
    font-size: 13px;
    font-weight: bold;
    margin-bottom: 6px;
}
input, textarea {
    width: 100%;
    box-sizing: border-box;
    padding: 12px 14px;
    border: 1px solid #dce5f2;
    border-radius: 14px;
    background: #fbfdff;
}
textarea {
    min-height: 120px;
    resize: vertical;
}
.footer {
    margin-top: 18px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
}
button {
    padding: 14px 22px;
    border: none;
    border-radius: 999px;
    background: #12344d;
    color: white;
    font-weight: bold;
    cursor: pointer;
}
.callout {
    max-width: 320px;
    font-size: 13px;
    color: #526071;
}
@media (max-width: 760px) {
    .grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>
<div class="shell">
    <div class="hero">
        <div class="badge">{{ project_name }}</div>
        <h1>{{ page_title }}</h1>
        <p>{{ description }}</p>
    </div>
    <div class="panel">
        <form method="POST">
            <div class="grid">
            {% for field in fields %}
                <div class="field {% if field.type == 'textarea' %}full{% endif %}">
                    <label for="{{ field.name }}">{{ field.label }}</label>
                    {% if field.type == "textarea" %}
                    <textarea id="{{ field.name }}" name="{{ field.name }}" placeholder="{{ field.placeholder }}" {% if field.required %}required{% endif %}></textarea>
                    {% else %}
                    <input id="{{ field.name }}" type="{{ field.type }}" name="{{ field.name }}" placeholder="{{ field.placeholder }}" {% if field.required %}required{% endif %}>
                    {% endif %}
                </div>
            {% endfor %}
            </div>
            <div class="footer">
                <div class="callout">The generated project includes server-side validation, sample persistence, README instructions, and a smoke test.</div>
                <button type="submit">Create Account</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
