<!DOCTYPE html>
<html>
<head>
<title>{{ page_title }}</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f3f7fb;
    color: #14213d;
}
.shell {
    max-width: 1080px;
    margin: 0 auto;
    padding: 36px 20px 64px;
}
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
}
.grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
}
.card {
    background: white;
    border-radius: 22px;
    padding: 22px;
    box-shadow: 0 18px 48px rgba(20, 33, 61, 0.08);
}
.metric {
    font-size: 30px;
    font-weight: bold;
    margin: 8px 0 0;
}
.wide {
    grid-column: 1 / -1;
}
ul {
    margin: 0;
    padding-left: 18px;
}
@media (max-width: 760px) {
    .grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>
<div class="shell">
    <div class="topbar">
        <div>
            <h1>{{ page_title }}</h1>
            <p>{{ description }}</p>
        </div>
        <div>{{ project_name }}</div>
    </div>
    <div class="grid">
        <div class="card">
            <div>Active users</div>
            <div class="metric">128</div>
        </div>
        <div class="card">
            <div>Pending actions</div>
            <div class="metric">14</div>
        </div>
        <div class="card">
            <div>Success rate</div>
            <div class="metric">98%</div>
        </div>
        <div class="card wide">
            <h3>Recent activity</h3>
            <ul>
                <li>New registration flow deployed</li>
                <li>Security check completed successfully</li>
                <li>Generated project bundle ready for export</li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>
